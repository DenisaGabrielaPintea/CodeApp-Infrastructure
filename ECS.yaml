Description: 'Stack 3: ECS Cluster, Task Definition and Service'

Parameters:
  EnvironmentName:
    Description: Name Projects
    Type: String
    Default: ScalabilitySolution

ImageTag:
    Type: String
    Default: latest
    Description: Tag-ul imaginii din ECR (ex. v1.0.2 sau latest)

Resources:
  # CLUSTER
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-Cluster"

  # LOG GROUP
  CloudWatchLogsGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}"
      RetentionInDays: 7

  # TASK DEFINITION
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-Task"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/ecsTaskExecutionRole"
      ContainerDefinitions:
        - Name: !Sub "${EnvironmentName}-ContainerApp"
          Image: 029139774173.dkr.ecr.eu-central-1.amazonaws.com/repository-codeapp:latest
          PortMappings:
            - ContainerPort: 5050
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CloudWatchLogsGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs

  # ECS SERVICE
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${EnvironmentName}-Service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1 #cate containere ruleaza
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            Fn::Split: [",", { "Fn::ImportValue": !Sub "${EnvironmentName}-PrivateSubnetsID" }]
          SecurityGroups:
            - Fn::ImportValue: !Sub "${EnvironmentName}-CLUSTER-SecurityGroup"
      LoadBalancers:
        - ContainerName: !Sub "${EnvironmentName}-ContainerApp"
          ContainerPort: 5050
          TargetGroupArn:
            Fn::ImportValue: !Sub "${EnvironmentName}-TargetGroup-ARN"

Outputs:
  ServiceArn:
    Description: ARN-ul serviciului ECS
    Value: !Ref ECSService